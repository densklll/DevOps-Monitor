name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository layout
        run: |
          test -f docker-compose.yml
          test -f locustfile.py
          test -d k8s
          test -d backend/tests
          test -d ci
          test -d .github/workflows

# 2022-01-23: Note K8s CPU requests for backend (CI runner)
